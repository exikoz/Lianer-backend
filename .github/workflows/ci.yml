name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests with coverage
        run: dotnet test --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Install reportgenerator
        if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Check coverage >= 80%
        if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          reportgenerator `
            -reports:"TestResults/**/coverage.cobertura.xml" `
            -targetdir:"coverage-report" `
            -reporttypes:"TextSummary"

          $summary = Get-Content "coverage-report/Summary.txt"
          $line = $summary | Select-String "Line coverage"
          $percent = [int]([regex]::Match($line.ToString(), '\d+').Value)

          Write-Host "Coverage: $percent%"

          if ($percent -lt 80) {
            Write-Error "Coverage is below 80%"
            exit 1
          }